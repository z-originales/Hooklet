services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "127.0.0.1:${HOOKLET_E2E_RABBIT_PORT:-5672}:5672"
      - "127.0.0.1:${HOOKLET_E2E_RABBIT_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 20
